project:
  type: website
  output-dir: _site
  resources:
    - robots.txt

website:
  title: "GEMMA"
  description: "Greenhouse gas Measurement and Modelling Advancement"

  site-url: "https://gemma-uk.github.io"

  navbar:
    background: primary
    foreground: light
    title: false
    logo: assets/gemma-logo-transparent-small.png
    logo-alt: "GEMMA project"
    logo-href: index.qmd
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Research highlights"
        href: research-highlights/index.qmd
      - text: "Outputs"
        href: outputs/index.qmd
      - text: "News"
        href: news/index.qmd
      - text: "Team"
        href: team.qmd
    right:
      - icon: github
        href: https://github.com/gemma-uk/gemma-website
        aria-label: "GitHub repository"

  page-footer:
    left: "© 2025–2026 GEMMA project"
    center: "Funded by UKRI"
    right: "Source code: [GitHub](https://github.com/gemma-uk/gemma-website) · Built with [Quarto](https://quarto.org)"
    background: dark

  search:
    location: navbar
    type: overlay

  open-graph:
    site-name: "GEMMA project"
    description: "Greenhouse gas Measurement and Modelling Advancement"
    image: /assets/gemma-logo-og.png

format:
  html:
    theme: [flatly, custom.scss]
    toc: false
    link-external-icon: true
    link-external-newwindow: true
    include-in-header:
      - text: |
          <meta name="robots" content="noindex, nofollow">
